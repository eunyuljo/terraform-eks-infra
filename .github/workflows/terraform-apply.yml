name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "live/**/*.tf"
      - "live/**/*.tfvars"

# NOTE: 실제 운영 환경에서는 아래 사항을 권장합니다:
# 1. environment protection rules 설정 (수동 승인 필요)
# 2. prod는 별도 approval workflow 분리
# 3. AWS credentials는 OIDC로 연동 (secrets 대신)

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed environments
        id: set-matrix
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'live/' | grep '\.tf$' | cut -d'/' -f2,3 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0)) | map(split("/") | {environment: .[0], lifecycle: .[1]})')
          echo "matrix={\"include\":$CHANGED}" >> $GITHUB_OUTPUT

  terraform-apply:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    # environment: ${{ matrix.environment }}  # Enable for protection rules
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: live/${{ matrix.environment }}/${{ matrix.lifecycle }}/

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: live/${{ matrix.environment }}/${{ matrix.lifecycle }}/
